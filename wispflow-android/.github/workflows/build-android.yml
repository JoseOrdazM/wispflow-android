name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.24.3'
  JAVA_VERSION: '17'
  JAVA_DISTRO: 'temurin'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v3
        with:
          distribution: ${{ env.JAVA_DISTRO }}
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wispflow-android-release
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Create Release v1.1
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.1
          name: WispFlow Android v1.1
          body: |
            ## WispFlow Android v1.1
            - Floating microphone overlay for voice transcription
            - Tap mic to record, tap again to stop and transcribe
            - Transcription copied to clipboard automatically
          files: build/app/outputs/flutter-apk/app-release.apk
          token: ${{ secrets.GITHUB_TOKEN }}
          make_latest: true
