name: Build & Release v1.1

on:
  push:
    tags:
      - 'v1.1'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag'
        required: false
        default: 'v1.1'

env:
  FLUTTER_VERSION: '3.22.5'
  JAVA_VERSION: '17'
  JAVA_DISTRO: 'temurin'
  GRADLE_VERSION: '8.3'

jobs:
  build_release:
    name: Build APK Release v1.1
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }} (${{ env.JAVA_DISTRO }})
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRO }}

      - name: Setup Gradle ${{ env.GRADLE_VERSION }}
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: Setup Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build APK release
        run: flutter build apk --release --split-per-abi

      - name: List APK artifacts
        run: ls -lh build/app/outputs/flutter-apk/

      - name: Upload APKs as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks-v1.1
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error

      - name: Upload APKs to GitHub Release v1.1
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.1
          name: Release v1.1
          body: |
            ## Release v1.1

            ### Cambios
            - Build automatizado con GitHub Actions
            - Flutter ${{ env.FLUTTER_VERSION }}
            - Gradle ${{ env.GRADLE_VERSION }}
            - Java ${{ env.JAVA_VERSION }} (Temurin)

            ### APKs generados
            - `app-armeabi-v7a-release.apk` (ARM 32-bit)
            - `app-arm64-v8a-release.apk` (ARM 64-bit)
            - `app-x86_64-release.apk` (x86_64)
          files: |
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
          draft: false
          prerelease: false
